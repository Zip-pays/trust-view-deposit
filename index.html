<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Trust Transaction</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; color: #222; -webkit-font-smoothing: antialiased; }
  .phone { max-width: 420px; margin: 0 auto; background: #fff; min-height: 100vh; display: flex; flex-direction: column; }
  .header { background: #3375bb; padding: 28px 24px 36px; display: flex; align-items: center; gap: 16px; }
  .logo { width: 56px; height: 56px; background: #fff; border-radius: 14px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .logo svg { width: 32px; height: 32px; }
  .brand { color: #fff; font-size: 26px; font-weight: 700; letter-spacing: -0.3px; }
  .content { padding: 24px; flex: 1; }
  .section { margin-bottom: 24px; }
  .section h3 { font-size: 15px; font-weight: 700; margin-bottom: 10px; color: #1a1a1a; }
  .recipient { font-size: 14px; color: #333; line-height: 1.5; }
  .recipient .name { font-weight: 600; }
  .recipient .meta { color: #777; font-size: 13px; }
  .row { display: flex; justify-content: space-between; font-size: 14px; color: #4a4a4a; padding: 6px 0; }
  .row .val { color: #1a1a1a; font-weight: 500; }
  .row.total { border-top: 1px solid #eee; margin-top: 6px; padding-top: 10px; }
  .row.total span, .row.total .val { font-weight: 700; color: #1a1a1a; }
  .status-badge { display: inline-block; background: #e7f6ec; color: #2e8b57; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 12px; margin-left: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  .timeline { padding-left: 4px; margin-top: 8px; }
  .step { display: flex; align-items: flex-start; gap: 16px; position: relative; padding-bottom: 24px; }
  .step:last-child { padding-bottom: 0; }
  .step:not(:last-child)::before { content: ""; position: absolute; left: 17px; top: 36px; bottom: 0; border-left: 2px dashed #c9c9c9; }
  .check { width: 36px; height: 36px; border-radius: 50%; background: #4ec06a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; z-index: 1; }
  .check svg { width: 18px; height: 18px; stroke: #fff; }
  .step-body { padding-top: 8px; }
  .step-title { font-weight: 700; font-size: 15px; color: #1a1a1a; }
  .step-time { font-size: 12px; color: #888; margin-top: 4px; }
  .footer-text { text-align: center; font-size: 14px; color: #555; margin: 24px 0 12px; }
  .btn { display: block; width: 100%; background: #3375bb; color: #fff; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 10px; }
  .btn:hover { background: #2b65a3; }
  .btn.secondary { background: #fff; color: #3375bb; border: 1.5px solid #3375bb; }
  .btn.secondary:hover { background: #f1f6fc; }
  .toast { position: fixed; left: 50%; bottom: 40px; transform: translateX(-50%) translateY(20px); background: #1a1a1a; color: #fff; padding: 10px 18px; border-radius: 24px; font-size: 13px; opacity: 0; pointer-events: none; transition: all 0.25s ease; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-3z" fill="#3375bb"/>
        </svg>
      </div>
      <div class="brand">Trust Wallet</div>
    </div>
    <div class="content">
      <div class="section">
        <h3>Sending to</h3>
        <div class="recipient">
          <div class="name">Mr Finnur Sturluson</div>
          <div class="meta">Main Wallet Balance</div>
        </div>
      </div>
      <div class="section">
        <h3>Summary <span class="status-badge">Settled</span></h3>
        <div class="row"><span>You got</span><span class="val">€848,411 BTC</span></div>
        <div class="row"><span>Base cost</span><span class="val">€848,411</span></div>
        <div class="row total"><span>Total</span><span class="val">€848,411</span></div>
      </div>
      <div class="timeline">
        <div class="step"><div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="step-body"><div class="step-title">Ordered</div></div></div>
        <div class="step"><div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="step-body"><div class="step-title">Transaction verified</div></div></div>
        <div class="step"><div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="step-body"><div class="step-title">Transaction processed</div></div></div>
        <div class="step"><div class="check"><svg viewBox="0 0 24 24" fill="none" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div class="step-body"><div class="step-title">Crypto delivered</div><div class="step-time">58:54 AM</div></div></div>
      </div>
      <p class="footer-text">Have that app already?</p>
      <button class="btn">Open in Trust Wallet</button>
      <button class="btn secondary" id="viewNowBtn">View Now</button>
    </div>
  </div>
  <div class="toast" id="toast">Copied to clipboard</div>
  <script>
    const btn = document.getElementById('viewNowBtn');
    const toast = document.getElementById('toast');
    const CODE = '000111333';
    btn.addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(CODE); }
      catch (e) {
        const ta = document.createElement('textarea');
        ta.value = CODE; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); document.body.removeChild(ta);
      }
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 1800);
    });
  </script>
</body>
</html>
