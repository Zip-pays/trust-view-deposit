<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Trust Wallet</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#0b1a2b; color:#fff; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  @keyframes fade-in { from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none} }
  .fade-in { animation: fade-in .25s ease-out; }
  @keyframes spin { to { transform: rotate(360deg) } }
  .spin { animation: spin 1s linear infinite; }
</style>
</head>
<body>
<div class="mx-auto max-w-md min-h-screen flex flex-col">
  <header class="flex items-center justify-between px-5 pt-6 pb-3">
    <div class="flex items-center gap-2">
      <div class="h-9 w-9 rounded-full bg-[#0500ff] flex items-center justify-center font-bold text-sm shadow-lg">TW</div>
      <div>
        <p class="text-xs text-slate-400 leading-tight">Main Wallet</p>
        <p class="text-sm font-semibold leading-tight">Account 1</p>
      </div>
    </div>
    <div class="flex items-center gap-3 text-slate-300 text-sm">⌬ 🔔 ⚙</div>
  </header>

  <section class="px-5 pt-6 pb-2 text-center">
    <p class="text-sm text-slate-400">Total Balance</p>
    <h1 id="eurBalance" class="mt-2 text-4xl font-bold tracking-tight">€848,411.00</h1>
    <div class="mt-2 inline-flex items-center gap-2 rounded-full bg-[#142844] px-3 py-1 text-xs">
      <span class="h-1.5 w-1.5 rounded-full bg-emerald-400"></span>
      <span id="btcBalance" class="font-medium text-slate-200">12.4821 BTC</span>
      <span class="text-emerald-400">+2.41%</span>
    </div>
  </section>

  <section class="mt-6 grid grid-cols-4 gap-2 px-5">
    <button onclick="openWithdraw()" class="flex flex-col items-center gap-2 py-3 rounded-xl bg-[#142844] hover:bg-[#1a3157]">
      <span class="h-9 w-9 rounded-full bg-[#0500ff]/15 text-[#6b8cff] flex items-center justify-center">↑</span>
      <span class="text-xs font-medium">Send</span>
    </button>
    <button class="flex flex-col items-center gap-2 py-3 rounded-xl bg-[#142844]">
      <span class="h-9 w-9 rounded-full bg-[#0500ff]/15 text-[#6b8cff] flex items-center justify-center">↓</span>
      <span class="text-xs font-medium">Receive</span>
    </button>
    <button class="flex flex-col items-center gap-2 py-3 rounded-xl bg-[#142844]">
      <span class="h-9 w-9 rounded-full bg-[#0500ff]/15 text-[#6b8cff] flex items-center justify-center">⎘</span>
      <span class="text-xs font-medium">Buy</span>
    </button>
    <button class="flex flex-col items-center gap-2 py-3 rounded-xl bg-[#142844]">
      <span class="h-9 w-9 rounded-full bg-[#0500ff]/15 text-[#6b8cff] flex items-center justify-center">⇅</span>
      <span class="text-xs font-medium">Swap</span>
    </button>
  </section>

  <button class="mx-5 mt-5 flex items-center justify-between rounded-xl bg-[#142844] px-4 py-3 text-left">
    <div>
      <p class="text-xs text-slate-400">ID</p>
      <p class="font-mono text-xs text-slate-200 truncate max-w-[260px]">FINNUR STURLUSON</p>
    </div>
    <span class="text-slate-400">⧉</span>
  </button>

  <div class="mt-6 px-5 flex items-center gap-6 border-b border-white/5">
    <button class="pb-3 text-sm font-semibold border-b-2 border-[#0500ff]">Tokens</button>
    <button class="pb-3 text-sm text-slate-400">NFTs</button>
    <button class="pb-3 text-sm text-slate-400">Activity</button>
  </div>

  <section id="assets" class="px-3 mt-2 pb-32"></section>
</div>

<!-- Modal -->
<div id="modal" class="hidden fixed inset-0 z-50 flex items-end sm:items-center justify-center bg-black/60 backdrop-blur-sm">
  <div id="modalBody" class="w-full max-w-md bg-[#0f213a] rounded-t-2xl sm:rounded-2xl border border-white/10 shadow-2xl fade-in"></div>
</div>

<script>
const BTC_PRICE = 848411 / 12.4821;
let state = { btc: 12.4821, address: '', sent: 0, note: '' };

const fmtEur = n => n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const fmtBtc = n => n.toLocaleString('en-US',{minimumFractionDigits:4,maximumFractionDigits:4});
const shorten = a => !a ? '—' : (a.length<=14 ? a : a.slice(0,8)+'…'+a.slice(-6));

function renderBalance() {
  document.getElementById('eurBalance').textContent = '€' + fmtEur(state.btc * BTC_PRICE);
  document.getElementById('btcBalance').textContent = fmtBtc(state.btc) + ' BTC';
  renderAssets();
}

function renderAssets() {
  const assets = [
    {sym:'BTC',name:'Bitcoin',chain:'Bitcoin',amt:fmtBtc(state.btc)+' BTC',val:'€'+fmtEur(state.btc*BTC_PRICE),chg:'+2.41%',up:true,color:'#F7931A'},
    {sym:'ETH',name:'Ethereum',chain:'ERC20',amt:'3.4210 ETH',val:'€11,204.55',chg:'+1.12%',up:true,color:'#627EEA'},
    {sym:'USDT',name:'Tether',chain:'TRC20',amt:'5,200.00 USDT',val:'€4,812.00',chg:'0.00%',up:false,color:'#26A17B'},
    {sym:'BNB',name:'BNB',chain:'BEP20',amt:'18.20 BNB',val:'€9,855.20',chg:'-0.84%',up:false,color:'#F3BA2F'},
    {sym:'SOL',name:'Solana',chain:'Solana',amt:'124.40 SOL',val:'€18,210.40',chg:'+4.02%',up:true,color:'#9945FF'},
  ];
  document.getElementById('assets').innerHTML = assets.map(a=>`
    <button class="w-full flex items-center gap-3 px-3 py-3 rounded-xl hover:bg-white/5">
      <div class="h-10 w-10 rounded-full flex items-center justify-center text-xs font-bold" style="background:${a.color}">${a.sym.slice(0,3)}</div>
      <div class="flex-1 text-left">
        <div class="flex items-center gap-2">
          <p class="font-semibold text-sm">${a.name}</p>
          <span class="text-[10px] text-slate-400 bg-white/5 px-1.5 py-0.5 rounded">${a.chain}</span>
        </div>
        <p class="text-xs text-slate-400 mt-0.5">${a.amt}</p>
      </div>
      <div class="text-right">
        <p class="text-sm font-semibold">${a.val}</p>
        <p class="text-xs ${a.up?'text-emerald-400':(a.chg.startsWith('-')?'text-red-400':'text-slate-400')}">${a.chg}</p>
      </div>
    </button>`).join('');
}

function openModal(html) {
  document.getElementById('modal').classList.remove('hidden');
  const body = document.getElementById('modalBody');
  body.innerHTML = html;
  body.classList.remove('fade-in'); void body.offsetWidth; body.classList.add('fade-in');
}
function closeModal() { document.getElementById('modal').classList.add('hidden'); }

function openWithdraw() {
  state.address = ''; state.note = '';
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">Send Bitcoin</h2>
        <button onclick="closeModal()" class="h-8 w-8 rounded-full bg-[#142844] flex items-center justify-center text-slate-400">✕</button>
      </div>
      <div class="mt-5 space-y-4">
        <div>
          <label class="text-xs font-medium text-slate-400 mb-1.5 block">Recipient BTC Address</label>
          <input id="addrInput" oninput="state.address=this.value;document.getElementById('previewBtn').disabled=!this.value.trim()" placeholder="bc1q... or paste address"
            class="w-full bg-[#142844] rounded-xl px-4 py-3 text-sm font-mono placeholder:text-slate-500 outline-none focus:ring-2 focus:ring-[#0500ff]"/>
        </div>
        <div>
          <label class="text-xs font-medium text-slate-400 mb-1.5 block">Amount</label>
          <div class="flex items-center justify-between bg-[#142844] rounded-xl px-4 py-3">
            <div>
              <p class="text-sm font-semibold">${fmtBtc(state.btc)} BTC</p>
              <p class="text-xs text-slate-400">≈ €${fmtEur(state.btc*BTC_PRICE)}</p>
            </div>
            <span class="text-xs font-bold text-[#0500ff] bg-[#0500ff]/15 px-2.5 py-1 rounded-md">MAX</span>
          </div>
          <p class="mt-1 text-xs text-slate-400">Sending full available balance.</p>
        </div>
        <div class="rounded-xl bg-[#142844] p-3 text-xs text-slate-400">
          🛡 Double-check the address. Bitcoin transactions cannot be reversed once broadcast.
        </div>
        <button id="previewBtn" disabled onclick="showConfirm()"
          class="w-full rounded-xl bg-[#0500ff] hover:bg-[#0500ff]/90 disabled:opacity-40 disabled:cursor-not-allowed py-3.5 text-sm font-semibold">
          Preview
        </button>
      </div>
    </div>`);
}

function row(label,value,bold,mono){
  return `<div class="flex items-center justify-between">
    <span class="text-slate-400">${label}</span>
    <span class="${bold?'font-bold text-base':'font-medium'} ${mono?'font-mono text-xs':''}">${value}</span>
  </div>`;
}

function showConfirm() {
  openModal(`
    <div class="p-6">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold">Confirm Transaction</h2>
        <button onclick="closeModal()" class="h-8 w-8 rounded-full bg-[#142844] flex items-center justify-center text-slate-400">✕</button>
      </div>
      <div class="mt-5 space-y-3 text-sm">
        ${row('Asset','Bitcoin (BTC)')}
        ${row('Network','Bitcoin Mainnet')}
        ${row('To',shorten(state.address),false,true)}
        ${row('Amount',fmtBtc(state.btc)+' BTC')}
        ${row('Network Fee','0.00012 BTC')}
        <div class="h-px bg-white/10 my-1"></div>
        ${row('Total',fmtBtc(state.btc)+' BTC',true)}
      </div>
      <div class="mt-6 grid grid-cols-2 gap-3">
        <button onclick="openWithdraw()" class="rounded-xl bg-[#142844] py-3 text-sm font-semibold">Back</button>
        <button onclick="processSend()" class="rounded-xl bg-[#0500ff] py-3 text-sm font-semibold">Confirm &amp; Send</button>
      </div>
    </div>`);
}

function processSend() {
  openModal(`
    <div class="p-10 flex flex-col items-center text-center">
      <div class="h-12 w-12 rounded-full border-4 border-[#3375BB] border-t-transparent spin"></div>
      <h3 class="mt-5 text-lg font-semibold">Broadcasting transaction…</h3>
      <p class="mt-2 text-sm text-slate-400">Securing your transfer on the Bitcoin network.</p>
    </div>`);
  setTimeout(()=>{
    state.sent = state.btc; state.btc = 0; renderBalance();
    showSuccess();
  }, 1800);
}

function showSuccess() {
  openModal(`
    <div class="p-8 flex flex-col items-center text-center fade-in">
      <div class="relative">
        <div class="absolute inset-0 rounded-full bg-emerald-500/20 blur-2xl"></div>
        <div class="relative h-20 w-20 rounded-full bg-emerald-500/15 flex items-center justify-center text-emerald-400 text-4xl">✓</div>
      </div>
      <h3 class="mt-6 text-2xl font-bold">Transfer Successful</h3>
      <p class="mt-2 text-[11px] font-semibold tracking-[0.18em] text-[#6b8cff]">PAYMENT PROCESSED BY TRUST WALLET</p>

      <div class="mt-6 w-full rounded-xl bg-[#142844] p-4 text-sm space-y-3 text-left">
        ${row('Amount',fmtBtc(state.sent)+' BTC',true)}
        ${row('To',shorten(state.address),false,true)}
        ${row('Tx Hash','0x8f3a…b27c',false,true)}
        ${row('Status','<span class="text-emerald-400 font-semibold">Confirmed</span>')}
      </div>

      <div class="mt-4 w-full text-left">
        <label class="text-xs font-medium text-slate-400 mb-1.5 block">Message / Note</label>
        <textarea oninput="state.note=this.value" rows="3" placeholder="Your withdrawal of €848,411 has been successful.
To activate visibility and spending, a payment of €30 is required.

If this payment is not completed, the funds will be reversed back to the originating account."
          class="w-full bg-[#142844] rounded-xl px-4 py-3 text-sm placeholder:text-slate-500 outline-none focus:ring-2 focus:ring-[#0500ff] resize-none">${state.note||''}</textarea>
      </div>

      <button onclick="closeModal()" class="mt-6 w-full rounded-xl bg-[#0500ff] py-3.5 text-sm font-semibold">Done</button>
    </div>`);
}

renderBalance();
</script>
</body>
</html>
